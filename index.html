<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Job Application Tracker</title>
  
  <!-- tailwind and fonts -->
  <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Geist:wght@100..900&family=Inter:ital,opsz,wght@0,14..32,100..900;1,14..32,100..900&family=Manrope:wght@200..800&family=Open+Sans:ital,wght@0,300..800;1,300..800&family=Outfit:wght@100..900&display=swap" rel="stylesheet">

  <!-- font awesome -->
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css" integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw==" crossorigin="anonymous" referrerpolicy="no-referrer" />

  <!-- daisyUi -->
  <link href="https://cdn.jsdelivr.net/npm/daisyui@5" rel="stylesheet" type="text/css" />
  <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
  
</head>
<body class="bg-slate-50 p-4 md:p-10 font-sans text-gray-800">
  <div class="max-w-5xl mx-auto space-y-8">
    <section class="bg-base-200 border-b-2 border-gray-300 py-6">
      <h1 class="text-xl md:text-3xl font-bold text-gray-800 mb-6">Job Application Tracker</h1>
      <div class="grid grid-cols-1 md:grid-cols-3 gap-4 md:gap-6">
        <div class="bg-white py-2 px-4 rounded-md">
          <p class="text-gray-800 font-medium mb-1">Total</p>
          <p id="total-job" class="text-xl md:text-4xl font-bold text-gray-800">0</p>
        </div>
        <div class="bg-white py-2 px-4 rounded-md">
          <p class="text-gray-800 font-medium mb-1">Interview</p>
          <p id="total-interview" class="text-xl md:text-4xl font-bold text-teal-500">0</p>
        </div>
        <div class="bg-white py-2 px-4 rounded-md">
          <p class="text-gray-800 font-medium mb-1">Rejected</p>
          <p id="total-rejected" class="text-xl md:text-4xl font-bold text-red-500">0</p>
        </div>
      </div>
    </section>

    <div class="flex justify-between items-center mb-4 mt-8">
      <p class="text-gray-900 font-bold text-xl">Available Jobs</p>
      <p id="job-count" class="text-gray-500 font-medium">0 jobs</p>
    </div>
    <div class="flex gap-4">
      <button id="all-btn" class="btn btn-soft bg-white hover:bg-blue-500 hover:text-white text-gray-600">All</button>
      <button id="interview-btn" class="btn btn-soft hover:bg-teal-600 hover:text-white bg-white text-gray-600">Interview</button>
      <button id="rejected-btn" class="btn btn-soft hover:bg-red-600 hover:text-white bg-white text-gray-600">Rejected</button>
    </div>

    <div id="container" class="space-y-4"></div>

    <div id="hidden-card" class="hidden bg-white rounded-lg p-6 relative">
      <h3 class="company-name text-lg font-bold text-gray-900"></h3>
      <p class="job-position text-gray-600 text-sm mt-1 mb-4"></p>
      <div class="flex flex-wrap gap-2 text-sm text-gray-500 mb-4 font-medium">
        <span class="job-location"></span> •
        <span class="job-type"></span> •
        <span class="job-salary"></span>
      </div>
      <span class="job-status px-3 py-1 rounded text-sm font-bold bg-blue-50 text-gray-600">NOT APPLIED</span>
      <p class="job-description text-gray-600 text-sm my-4"></p>
      
      <div>
        <button class="btn-interview btn btn-soft btn-success">INTERVIEW</button>
        <button class="btn-rejected btn btn-soft btn-error">REJECTED</button>
        <button class="btn-delete btn bg-white rounded-full p-3 absolute top-4 right-4 text-gray-500 hover:bg-red-300"><i class="fa-solid fa-trash-can"></i></button>
      </div>
    </div>
    <div id="hidden-no-job" class="hidden flex-col items-center justify-center p-11 text-center bg-white rounded-md mt-4">
      <img src="/jobs.png" alt="" class="mb-4">
      <h3 class="text-xl font-bold text-gray-700">No Jobs Available</h3>
      <p class="text-gray-500 mt-2">Check back soon for new job opportunities</p>
    </div>
  </div>

  <script src="script.js"></script>

</body>
</html>
